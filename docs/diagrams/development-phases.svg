<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">GPT App POC Development Phases</title>
  <desc id="desc">Timeline showing specification-driven phases from 001 to 016 and major implementation milestones.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; font: 700 30px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #94a3b8; font: 400 15px "Segoe UI", Arial, sans-serif; }
      .phaseText { fill: #0f172a; font: 700 14px "Segoe UI", Arial, sans-serif; }
      .phaseSpec { fill: #1e293b; font: 500 12px "Segoe UI", Arial, sans-serif; }
      .milestone { fill: #cbd5e1; font: 500 12px "Segoe UI", Arial, sans-serif; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .tick { stroke: #64748b; stroke-width: 1.5; }
      .line { stroke: #475569; stroke-width: 4; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="520" rx="20"/>
  <text class="title" x="48" y="56">GPT App POC: Iterative Delivery Timeline</text>
  <text class="subtitle" x="48" y="84">Intent first (specs 001-016), then implementation hardening and expansion</text>

  <line class="axis" x1="70" y1="420" x2="1330" y2="420"/>
  <line class="line" x1="90" y1="420" x2="1310" y2="420"/>

  <g transform="translate(90,0)">
    <rect x="0" y="250" width="170" height="120" rx="10" fill="#38bdf8"/>
    <text class="phaseText" x="12" y="278">Phase A</text>
    <text class="phaseSpec" x="12" y="300">001-003</text>
    <text class="phaseSpec" x="12" y="322">MCP baseline</text>
    <text class="phaseSpec" x="12" y="342">+ readiness</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-28" y="462">2026-01-30</text>
  </g>

  <g transform="translate(290,0)">
    <rect x="0" y="230" width="170" height="140" rx="10" fill="#22d3ee"/>
    <text class="phaseText" x="12" y="258">Phase B</text>
    <text class="phaseSpec" x="12" y="280">004-005</text>
    <text class="phaseSpec" x="12" y="302">Jira secure intake</text>
    <text class="phaseSpec" x="12" y="322">+ skill discovery</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-20" y="462">2026-02-12</text>
  </g>

  <g transform="translate(490,0)">
    <rect x="0" y="210" width="190" height="160" rx="10" fill="#34d399"/>
    <text class="phaseText" x="12" y="238">Phase C</text>
    <text class="phaseSpec" x="12" y="260">006-007</text>
    <text class="phaseSpec" x="12" y="282">sosreport + engage</text>
    <text class="phaseSpec" x="12" y="302">integrated workflow</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-20" y="462">2026-02-18</text>
  </g>

  <g transform="translate(710,0)">
    <rect x="0" y="230" width="160" height="140" rx="10" fill="#86efac"/>
    <text class="phaseText" x="12" y="258">Phase D</text>
    <text class="phaseSpec" x="12" y="280">008-009</text>
    <text class="phaseSpec" x="12" y="302">endpoint +</text>
    <text class="phaseSpec" x="12" y="322">host compat</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-20" y="462">2026-02-18</text>
  </g>

  <g transform="translate(900,0)">
    <rect x="0" y="190" width="190" height="180" rx="10" fill="#fcd34d"/>
    <text class="phaseText" x="12" y="218">Phase E</text>
    <text class="phaseSpec" x="12" y="240">010-012</text>
    <text class="phaseSpec" x="12" y="262">step split, consent gate,</text>
    <text class="phaseSpec" x="12" y="282">async progress, UI swap</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-20" y="462">2026-03-03</text>
  </g>

  <g transform="translate(1120,0)">
    <rect x="0" y="170" width="190" height="200" rx="10" fill="#fb7185"/>
    <text class="phaseText" x="12" y="198">Phase F</text>
    <text class="phaseSpec" x="12" y="220">013-016</text>
    <text class="phaseSpec" x="12" y="242">headless consent path,</text>
    <text class="phaseSpec" x="12" y="262">split readiness,</text>
    <text class="phaseSpec" x="12" y="282">Jira Cloud auth</text>
    <line class="tick" x1="0" y1="420" x2="0" y2="440"/>
    <text class="milestone" x="-20" y="462">2026-03-24</text>
  </g>

  <text class="subtitle" x="48" y="118">Tag marker: 0.1.0 on 2026-03-10 (self-hosted Jira variant with PatternFly UI and text fallback)</text>
</svg>
